<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Email Verified</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background: #f5f7fb;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .card {
                background: #fff;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.08);
                text-align: center;
                max-width: 420px;
            }

            h1 {
                color: #28a745;
                margin-bottom: 15px;
            }

            p {
                color: #555;
                line-height: 1.6;
            }

            .icon {
                font-size: 60px;
                margin-bottom: 20px;
            }

            a {
                display: inline-block;
                margin-top: 20px;
                padding: 12px 24px;
                background: #bb269b;
                color: white;
                text-decoration: none;
                border-radius: 6px;
            }

            a:hover {
                background: #a31f87;
            }
        </style>
    </head>
    <body>

        <div class="card">
            <div class="icon">✅</div>

            <h1>Email Verified!</h1>

            <p>
                Your email address has been successfully verified.
                Your Chatify account is now active.
            </p>

            <p>
                You can now close this page and log in to your account.
            </p>

            <a href="#">Go to Chatify</a>
        </div>
    </body>
</html>
