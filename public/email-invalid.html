<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Invalid Verification Link</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f5f7fb;
            }

            .container {
                width: 420px;
                background: #fff;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
                text-align: center;
            }

            .icon {
                font-size: 60px;
                margin-bottom: 20px;
            }

            h1 {
                color: #dc3545;
                margin-bottom: 15px;
            }

            p {
                color: #555;
                line-height: 1.6;
                margin-bottom: 12px;
            }

            .note {
                font-size: 14px;
                color: #888;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="icon">❌</div>

            <h1>Invalid or Expired Link</h1>

            <p>
                This email verification link is invalid or has expired.
            </p>

            <p class="note">
                Please request a new verification email and try again.
            </p>
        </div>

    </body>
</html>
